name: CodeGenie

options:
  bundleIdPrefix: com.codegenie
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: UDM4W27W9V

targets:
  CodeGenie:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodeGenie
        excludes:
          - Resources/L10N.md
          - Resources/Assets.xcassets/AppIcon.appiconset/README.md
    info:
      path: CodeGenie/Resources/Info.plist
      properties:
        CFBundleDisplayName: CodeGenie
        CFBundleName: CodeGenie
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        NSBonjourServices:
          - _codegenie-companion._tcp
        NSCameraUsageDescription: Scan a pairing QR code to connect to your Mac companion.
        NSLocalNetworkUsageDescription: CodeGenie connects to your Mac on the local network to pair with the desktop companion app that drives Xcode and Safari for you.
        NSPhotoLibraryAddUsageDescription: Save generated app icons and TestFlight screenshots to your Photos library.
        UILaunchScreen:
          UIColorName: AccentColor
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Automatic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codegenie.app
        PRODUCT_NAME: CodeGenie
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_COMPILATION_MODE: wholemodule

schemes:
  CodeGenie:
    build:
      targets:
        CodeGenie: all
    run:
      config: Debug
    archive:
      config: Release
