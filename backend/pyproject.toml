[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["genie_swarm/tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",  # we wrap manually
    "B008",  # FastAPI Depends() default needs a call
]
